name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test (Ubuntu)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libgtest-dev libgmock-dev
      
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCORTEX_BUILD_TESTS=ON -DCORTEX_BUILD_BENCHMARKS=OFF
      
      - name: Build
        run: cmake --build build --parallel
      
      - name: Run tests
        run: ctest --output-on-failure --test-dir build
      
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cortex-build-artifacts
          path: |
            build/src/libcortex.*
            build/tests/*
            build/benchmarks/*
          retention-days: 7

  build-clang:
    name: Build (Clang)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-16 libc++-16-dev libc++abi-16-dev
      
      - name: Configure CMake with Clang
        run: |
          cmake -B build-clang \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-16 \
            -DCORTEX_BUILD_TESTS=ON
      
      - name: Build
        run: cmake --build build-clang --parallel
      
      - name: Run tests
        run: ctest --output-on-failure --test-dir build-clang

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ gcovr lcov libgtest-dev
      
      - name: Configure with coverage
        run: |
          cmake -B build-coverage \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCORTEX_BUILD_TESTS=ON \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"
      
      - name: Build
        run: cmake --build build-coverage --parallel
      
      - name: Run tests with coverage
        run: ctest --output-on-failure --test-dir build-coverage
      
      - name: Generate coverage report
        run: |
          gcovr --sonarqube coverage.xml --exclude-unreachable-branches || true
          lcov --capture --directory build-coverage --output-file coverage.info
          lcov --remove coverage.info '/usr/*' --output-file coverage.filtered.info
          genhtml coverage.filtered.info --output-directory coverage-report
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: cortex-coverage-report
          path: coverage-report/
          retention-days: 14

  notifications:
    name: Failure Notifications
    needs: [build-and-test, build-clang]
    if: failure()
    runs-on: ubuntu-latest
    
    steps:
      - name: Notify on failure
        run: |
          echo "::notice title=CI Build Failed::The CI pipeline for Cortex has failed. Please check the logs at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      
      - name: Create failure summary
        if: github.event_name == 'push'
        run: |
          echo "## CI Build Failure Summary" > failure_summary.md
          echo "**Repository:** ${{ github.repository }}" >> failure_summary.md
          echo "**Branch:** ${{ github.ref_name }}" >> failure_summary.md
          echo "**Run:** [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> failure_summary.md
          echo "**Triggered by:** ${{ github.actor }}" >> failure_summary.md
          
      - name: Upload failure summary
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: failure-summary
          path: failure_summary.md
          retention-days: 30
